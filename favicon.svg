<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2563EB"/>
  <g transform="translate(8,8)">
    <!-- 3x3 grid background -->
    <rect x="0" y="0" width="48" height="48" rx="4" fill="#FFFFFF"/>
    
    <!-- Thin grid lines -->
    <g stroke="#D1D5DB" stroke-width="0.5">
      <line x1="16" y1="0" x2="16" y2="48"/>
      <line x1="32" y1="0" x2="32" y2="48"/>
      <line x1="0" y1="16" x2="48" y2="16"/>
      <line x1="0" y1="32" x2="48" y2="32"/>
    </g>
    
    <!-- Thick 3x3 box lines -->
    <g stroke="#1F2937" stroke-width="2">
      <line x1="16" y1="0" x2="16" y2="48"/>
      <line x1="32" y1="0" x2="32" y2="48"/>
      <line x1="0" y1="16" x2="48" y2="16"/>
      <line x1="0" y1="32" x2="48" y2="32"/>
    </g>
    
    <!-- Border -->
    <rect x="0" y="0" width="48" height="48" rx="2" fill="none" stroke="#1F2937" stroke-width="2.5"/>
    
    <!-- Some numbers -->
    <text x="8" y="12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2563EB" text-anchor="middle">7</text>
    <text x="24" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2563EB" text-anchor="middle">5</text>
    <text x="40" y="44" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2563EB" text-anchor="middle">9</text>
    <text x="8" y="44" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#111827" text-anchor="middle">3</text>
    <text x="40" y="12" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#111827" text-anchor="middle">1</text>
  </g>
</svg>